name: Test

run-name: "[Test] ${{ github.event.pull_request.title || github.ref_name }}"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python 3.${{ matrix.python-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["12", "13", "14"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          pixi-version: v0.66.0
          cache: true
          environments: py3${{ matrix.python-version }}

      - name: Run tests (Python 3.${{ matrix.python-version }})
        run: pixi run -e py3${{ matrix.python-version }} test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-py3${{ matrix.python-version }}
          path: .pytest/test-results.xml
          retention-days: 30

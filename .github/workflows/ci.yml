name: Test

run-name: "[Test] ${{ github.event.pull_request.title || github.ref_name }}"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          pixi-version: v0.69.0
          cache: true
          environments: lint

      - name: Run ruff
        run: pixi run -e lint ruff-lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          pixi-version: v0.69.0
          cache: true
          environments: lint

      - name: Run basedpyright
        run: pixi run -e lint typecheck

  test:
    name: Test (Python 3.${{ matrix.python-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["12", "13", "14"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          pixi-version: v0.69.0
          cache: true
          environments: py3${{ matrix.python-version }}

      - name: Run tests (Python 3.${{ matrix.python-version }})
        run: pixi run -e py3${{ matrix.python-version }} test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-py3${{ matrix.python-version }}
          path: .pytest/test-results.xml
          retention-days: 30

  integration:
    name: Integration
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          pixi-version: v0.69.0
          cache: true
          environments: integration

      - name: Run standalone integration suite
        env:
          DITTO_INTEGRATION_ARTIFACTS_DIR: .pytest/integration-artifacts
        run: pixi run -e integration test-integration

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-integration
          path: .pytest/test-results.xml
          retention-days: 30

      - name: Upload integration artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-artifacts
          path: .pytest/integration-artifacts
          retention-days: 30
